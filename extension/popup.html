<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BuloCheck</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 300px;
        padding: 15px;
        background: #0f172a;
        color: white;
      }

      h2 {
        text-align: center;
        margin-bottom: 15px;
      }

      .section {
        margin-bottom: 15px;
      }

      .label {
        font-weight: bold;
        margin-bottom: 5px;
      }

      .box {
        background: #1e293b;
        padding: 10px;
        border-radius: 8px;
        max-height: 100px;
        overflow-y: auto;
        font-size: 13px;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      .status {
        margin-top: 12px;
        text-align: center;
        font-size: 12px;
        opacity: 0.8;
      }

      .secondary-btn {
        margin-top: 8px;
        background: #334155;
      }

      .secondary-btn:hover {
        background: #475569;
      }
    </style>
  </head>

  <body>
    <h2>BuloCheck</h2>

    <div class="section">
      <div class="label">Selected Title</div>
      <div class="box" id="titleBox">No title selected</div>
    </div>

    <div class="section">
      <div class="label">Selected Article Body</div>
      <div class="box" id="bodyBox">No body selected</div>
    </div>

    <button id="analyze">Analyze Article</button>

    <button id="clear" class="secondary-btn">Clear Selection</button>

    <div class="status" id="status">Waiting for selection...</div>

    <script src="popup.js"></script>
  </body>
</html>

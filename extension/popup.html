<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BuloCheck</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 220px;
        padding: 12px;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      h3 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;

        background: #3b82f6;

        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <h3>BuloCheck</h3>

    <button id="analyze">Analyze article</button>

    <div class="status" id="status">Ready</div>

    <script src="popup.js"></script>

</html>
